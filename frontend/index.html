<!DOCTYPE html>
<html>
<head>
  <title>MedPet 🩺</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #2b7cff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #2b7cff;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #e5e5ea;
      color: black;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #2b7cff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1f5fd6;
    }

    .loading {
      font-style: italic;
      color: gray;
    }
  </style>
</head>

<body>

<header>MedPet 🩺</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Describe your symptoms..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const message = input.value.trim();

  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const loading = document.createElement("div");
  loading.className = "message bot loading";
  loading.innerText = "MedPet is thinking...";
  chat.appendChild(loading);

  try {
    const res = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    loading.remove();
    addMessage(data.reply, "bot");

  } catch (err) {
    loading.remove();
    addMessage("⚠️ Error connecting to server.", "bot");
  }
}
</script>

</body>
</html>
